name: Leak Intel Pipeline

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      reset_db:
        description: "Wipe and re-seed the database from scratch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:         ${{ secrets.DATABASE_URL }}
      REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT:    "warhammer-leak-intel/1.0"
      YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set!"
            echo "Go to: Settings → Secrets → Actions → New secret"
            echo "Name: DATABASE_URL"
            echo "Value: postgresql://postgres.ybxdtbooijinepvlhndm:Rumormonger40k@aws-1-us-east-2.pooler.supabase.com:6543/postgres?sslmode=require"
            exit 1
          fi
          echo "DATABASE_URL is set (starts with: ${DATABASE_URL:0:30}...)"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt yt-dlp

      - name: Run schema migration
        run: python -c "
import os, psycopg2
conn = psycopg2.connect(os.environ['DATABASE_URL'])
conn.autocommit = True
cur = conn.cursor()
cur.execute(open('migrations/0001_init_schema.sql').read())
cur.close(); conn.close()
print('Migration complete')
"

      - name: Reset database (manual trigger only)
        if: ${{ github.event.inputs.reset_db == 'true' }}
        run: python -c "
import os, psycopg2
conn = psycopg2.connect(os.environ['DATABASE_URL'])
conn.autocommit = True
cur = conn.cursor()
cur.execute('TRUNCATE claim_evidence, claims, documents, sources RESTART IDENTITY CASCADE;')
cur.close(); conn.close()
print('Database reset complete')
"

      # Reddit scraper disabled – using GW + YouTube only
      # - name: Scrape Reddit
      #   run: python scrapers/reddit_scraper.py

      - name: Scrape YouTube
        run: python scrapers/youtube_scraper.py
        timeout-minutes: 4

      - name: Scrape Warhammer Community
        run: python scrapers/wahammer_community_scraper.py
        timeout-minutes: 3

      - name: Extract claims
        run: python backend/nlp/claim_extraction.py

      - name: Score claims
        run: python backend/scoring/veracity_engine.py

      - name: AI summarize claims (Gemini)
        run: python backend/nlp/summarizer.py
        timeout-minutes: 8

      - name: Print summary
        run: python -c "
import os, psycopg2
conn = psycopg2.connect(os.environ['DATABASE_URL'])
cur = conn.cursor()
for table in ['sources','documents','claims','claim_evidence']:
    cur.execute(f'SELECT COUNT(*) FROM {table}')
    print(f'{table}: {cur.fetchone()[0]}')
cur.execute('SELECT status, COUNT(*) FROM claims GROUP BY status ORDER BY 2 DESC')
print('--- Status breakdown ---')
for row in cur.fetchall():
    print(f'  {row[0]}: {row[1]}')
cur.close(); conn.close()
"
